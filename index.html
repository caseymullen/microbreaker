html, body {
height: 100%;
overflow: hidden;
font-family: ‘DM Mono’, monospace;
touch-action: manipulation;
}

height: 100%;

flex-direction: column;
position: relative;
transition: background var(–transition);
}

/* ── Background layers ── */
.bg-layer {
position: absolute; inset: 0;
opacity: 0;
transition: opacity var(–transition);
pointer-events: none;
}
.bg-layer.active { opacity: 1; }

.bg-work {
background: radial-gradient(ellipse 80% 60% at 50% 30%, #3d1880 0%, #1a0a2e 60%, #0d0520 100%);
}
.bg-break {
background: radial-gradient(ellipse 80% 60% at 50% 70%, #0a4030 0%, #051a12 60%, #020d09 100%);
}
.bg-rest {
background: radial-gradient(ellipse 80% 60% at 50% 50%, #1a1a4a 0%, #0a0a1a 60%, #05050f 100%);
}

/* Noise texture overlay */
.noise {
position: absolute; inset: 0;
opacity: 0.035;
pointer-events: none;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);
background-size: 200px 200px;
}

#main {
position: relative;
z-index: 10;
height: 100%;
display: flex;
flex-direction: column;

#macro-bar-track {

}

#macro-bar-fill {
height: 100%;
border-radius: 2px;
transition: width 1s linear, background var(–transition);

#macro-time {

/* ── Center: main display ── */
#center-section {

#timer-inner {

<script>
// ── State ──────────────────────────────────────────────────────────────
const cfg = {
  workSec:  25,
  breakSec: 15,
  blockMin: 5,
  restMin:  1.5,
  sound: true
};

const PHASES = { WORK: 'work', BREAK: 'break', REST: 'rest' };

let phase       = PHASES.WORK;
let microRemain = cfg.workSec;   // seconds remaining in micro phase
let macroRemain = cfg.blockMin * 60; // seconds remaining in macro block
let blockCount  = 1;
let paused      = false;
let tickInterval = null;
let lastTick    = null;

// ── DOM ────────────────────────────────────────────────────────────────
const bgWork  = document.getElementById('bg-work');
const bgBreak = document.getElementById('bg-break');
const bgRest  = document.getElementById('bg-rest');
const macroLabel  = document.getElementById('macro-label');
const macroFill   = document.getElementById('macro-bar-fill');
const macroTime   = document.getElementById('macro-time');
const phaseLabel  = document.getElementById('phase-label');
const timeDisplay = document.getElementById('time-display');
const timeTenths  = document.getElementById('time-tenths');
const pulseDot    = document.getElementById('pulse-dot');
const phaseDesc   = document.getElementById('phase-desc');
const advanceBtn  = document.getElementById('advance-btn');
const pauseBtn    = document.getElementById('pause-btn');
const settingsBtn = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
const closeSettings = document.getElementById('close-settings');
const soundToggle = document.getElementById('sound-toggle');
const ringFill    = document.getElementById('ring-fill');

const CIRCUMFERENCE = 2 * Math.PI * 100; // 628.3

// ── Audio ──────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freqs, durations, type='sine', gain=0.3) {
  if (!cfg.sound) return;
  try {
    const ctx = getAudio();
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const vol = ctx.createGain();
      osc.connect(vol); vol.connect(ctx.destination);
      osc.type = type;
      osc.frequency.value = freq;
      const delay = durations.slice(0,i).reduce((a,b)=>a+b,0);
      const dur   = durations[i];
      vol.gain.setValueAtTime(0, ctx.currentTime + delay);
      vol.gain.linearRampToValueAtTime(gain, ctx.currentTime + delay + 0.01);
      vol.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + dur + 0.02);
    });
  } catch(e) {}
}

function soundWorkStart()  { playTone([880, 1100], [0.1, 0.15], 'triangle', 0.25); }
function soundBreakStart() { playTone([660, 440],  [0.1, 0.25], 'sine', 0.2); }
function soundRestStart()  { playTone([440, 330, 220], [0.15, 0.15, 0.4], 'sine', 0.2); }
function soundRestEnd()    { playTone([220, 330, 440, 660], [0.1, 0.1, 0.1, 0.2], 'triangle', 0.25); }
function soundCountdown()  { playTone([520], [0.06], 'square', 0.12); }

// ── Theme ──────────────────────────────────────────────────────────────
const themeEls = () => [
  macroLabel, macroFill, macroTime, phaseLabel, timeDisplay,
  timeTenths, pulseDot, phaseDesc, advanceBtn, pauseBtn, settingsBtn, ringFill
];

function applyTheme(p) {
  const cls = p === PHASES.WORK ? 'theme-work'
            : p === PHASES.BREAK ? 'theme-break'
            : 'theme-rest';
  themeEls().forEach(el => {
    el.classList.remove('theme-work','theme-break','theme-rest');
    el.classList.add(cls);
  });
  bgWork.classList.toggle('active',  p === PHASES.WORK);
  bgBreak.classList.toggle('active', p === PHASES.BREAK);
  bgRest.classList.toggle('active',  p === PHASES.REST);
}

// ── Ring ───────────────────────────────────────────────────────────────
function setRing(fraction) {
  // fraction 1 = full, 0 = empty
  const offset = CIRCUMFERENCE * (1 - Math.max(0, Math.min(1, fraction)));
  ringFill.style.strokeDashoffset = offset;
}

// ── Formatting ─────────────────────────────────────────────────────────
function fmtSec(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m > 0 ? `${m}:${String(sec).padStart(2,'0')}` : `0:${String(sec).padStart(2,'0')}`;
}
function fmtMin(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ── Phase transitions ──────────────────────────────────────────────────
function goToPhase(newPhase, fromAdvance=false) {
  phase = newPhase;
  applyTheme(phase);

  // Animate timer
  document.getElementById('timer-ring').classList.remove('phase-transition');
  void document.getElementById('timer-ring').offsetWidth;
  document.getElementById('timer-ring').classList.add('phase-transition');

  if (phase === PHASES.WORK) {
    microRemain = cfg.workSec;
    phaseLabel.textContent = 'Practice';
    phaseLabel.classList.remove('rest-label');
    phaseDesc.textContent = 'Focus on the phrase';
    pulseDot.classList.add('pulsing');
    if (!fromAdvance) soundWorkStart();
  } else if (phase === PHASES.BREAK) {
    microRemain = cfg.breakSec;
    phaseLabel.textContent = 'Micro-Break';
    phaseLabel.classList.remove('rest-label');
    phaseDesc.textContent = 'Breathe · let it settle';
    pulseDot.classList.remove('pulsing');
    soundBreakStart();
  } else {
    microRemain = cfg.restMin * 60;
    phaseLabel.textContent = 'Long Rest';
    phaseLabel.classList.add('rest-label');
    phaseDesc.textContent = 'Block complete · rest well';
    pulseDot.classList.remove('pulsing');
    soundRestStart();
  }
  renderMicro();
}

function advancePhase() {
  if (phase === PHASES.WORK) {
    goToPhase(PHASES.BREAK, true);
    soundBreakStart();
  } else if (phase === PHASES.BREAK) {
    // check if macro block expired
    if (macroRemain <= 0) {
      startNewBlock(true);
    } else {
      goToPhase(PHASES.WORK, true);
      soundWorkStart();
    }
  } else {
    // REST → start fresh block
    blockCount++;
    macroRemain = cfg.blockMin * 60;
    soundRestEnd();
    goToPhase(PHASES.WORK, true);
    soundWorkStart();
  }
}

function startNewBlock(fromBreak=false) {
  blockCount++;
  macroRemain = cfg.blockMin * 60;
  goToPhase(PHASES.REST, fromBreak);
}

// ── Render ─────────────────────────────────────────────────────────────
function renderMicro() {
  const total = phase === PHASES.WORK ? cfg.workSec
              : phase === PHASES.BREAK ? cfg.breakSec
              : cfg.restMin * 60;
  const fraction = microRemain / total;
  setRing(fraction);
  timeDisplay.textContent = fmtSec(microRemain);

  // Tenths dots as countdown indicator
  const pct = Math.round(fraction * 5);
  timeTenths.textContent = '· '.repeat(Math.max(0,pct)).trim() || '·';
}

function renderMacro() {
  const total = cfg.blockMin * 60;
  const elapsed = total - macroRemain;
  const pct = Math.max(0, Math.min(100, (elapsed / total) * 100));
  macroFill.style.width = pct + '%';
  macroLabel.textContent = `Session block · ${blockCount}`;
  macroTime.textContent = `${fmtMin(elapsed)} / ${fmtMin(total)}`;
}

// ── Tick ───────────────────────────────────────────────────────────────
function tick() {
  if (paused) { lastTick = performance.now(); return; }

  const now = performance.now();
  const dt = lastTick ? (now - lastTick) / 1000 : 0;
  lastTick = now;

  // countdown beeps at 3, 2, 1
  const prevFloor = Math.ceil(microRemain);
  microRemain = Math.max(0, microRemain - dt);

  if (phase !== PHASES.REST) {
    const newFloor = Math.ceil(microRemain);
    if (prevFloor !== newFloor && newFloor <= 3 && newFloor > 0) soundCountdown();
  }

  // Macro clock only ticks during WORK and BREAK
  if (phase === PHASES.WORK || phase === PHASES.BREAK) {
    macroRemain = Math.max(0, macroRemain - dt);
  }

  if (microRemain <= 0) {
    // Auto advance
    if (phase === PHASES.WORK) {
      goToPhase(PHASES.BREAK);
    } else if (phase === PHASES.BREAK) {
      if (macroRemain <= 0) {
        startNewBlock();
      } else {
        goToPhase(PHASES.WORK);
      }
    } else {
      // REST done
      blockCount++;
      macroRemain = cfg.blockMin * 60;
      soundRestEnd();
      goToPhase(PHASES.WORK);
    }
  }

  renderMicro();
  renderMacro();
}

// ── Settings ───────────────────────────────────────────────────────────
const settingsMap = {
  workSec:  { min: 5,   max: 120, step: 5,   fmt: v => v+'s' },
  breakSec: { min: 5,   max: 60,  step: 5,   fmt: v => v+'s' },
  blockMin: { min: 1,   max: 15,  step: 1,   fmt: v => v+'m' },
  restMin:  { min: 0.5, max: 5,   step: 0.5, fmt: v => v+'m' },
};

function updateSettingsUI() {
  for (const [key, meta] of Object.entries(settingsMap)) {
    document.getElementById('val-'+key).textContent = meta.fmt(cfg[key]);
  }
}

document.querySelectorAll('.adj-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.target;
    const delta  = parseFloat(btn.dataset.delta);
    const meta   = settingsMap[target];
    cfg[target] = Math.max(meta.min, Math.min(meta.max, cfg[target] + delta));
    updateSettingsUI();
  });
});

soundToggle.addEventListener('click', () => {
  cfg.sound = !cfg.sound;
  soundToggle.classList.toggle('on', cfg.sound);
});

settingsBtn.addEventListener('click', () => {
  paused = true;
  pauseBtn.textContent = '▶ Resume';
  settingsPanel.classList.add('open');
  updateSettingsUI();
});

closeSettings.addEventListener('click', () => {
  settingsPanel.classList.remove('open');
  // Reset current micro phase with new duration
  microRemain = Math.min(microRemain,
    phase === PHASES.WORK ? cfg.workSec :
    phase === PHASES.BREAK ? cfg.breakSec : cfg.restMin * 60
  );
  renderMicro();
});

// ── Pause ──────────────────────────────────────────────────────────────
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
  if (!paused) {
    lastTick = performance.now();
    // Unlock audio context on iOS
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
});

// ── Advance ────────────────────────────────────────────────────────────
advanceBtn.addEventListener('click', advanceClick);
function advanceClick() {
  // unlock audio on first tap (iOS requirement)
  if (!audioCtx) { getAudio(); }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (paused) {
    paused = false;
    pauseBtn.textContent = '⏸ Pause';
    lastTick = performance.now();
  }
  advancePhase();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (settingsPanel.classList.contains('open')) return;
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    advanceClick();
  }
  if (e.key === 'p' || e.key === 'P') {
    pauseBtn.click();
  }
});

// ── Init ───────────────────────────────────────────────────────────────
applyTheme(PHASES.WORK);
renderMicro();
renderMacro();
updateSettingsUI();

tickInterval = setInterval(tick, 50); // 20fps is plenty
</script>

</body>
</html>
